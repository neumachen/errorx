version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - revive
    - gosec

  settings:
    gosec:
      excludes:
        # G104: errcheck already handles unchecked errors.
        - G104
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
